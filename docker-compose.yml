services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-drupal}
      DB_USER: ${DB_USER:-drupal}
      DB_PASS: ${DB_PASS:-drupal}
      DB_ROOT_PASS: ${DB_ROOT_PASS:-root}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT:-CHANGE_ME}
      APP_ENV: ${APP_ENV:-local}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      SSH_PUBLIC_KEYS: ${SSH_PUBLIC_KEYS:-}
      SSH_PUBLIC_KEY: ${SSH_PUBLIC_KEY:-}
      SSH_KEY_DEV1: ${SSH_KEY_DEV1:-}
      SSH_KEY_DEV2: ${SSH_KEY_DEV2:-}
      SSH_KEY_DEV3: ${SSH_KEY_DEV3:-}
      SSH_KEY_DEV4: ${SSH_KEY_DEV4:-}
      SSH_KEY_DEV5: ${SSH_KEY_DEV5:-}
      INSTALL_SITE: ${INSTALL_SITE:-false}
      INSTALL_FROM_CONFIG: ${INSTALL_FROM_CONFIG:-false}
      INSTALL_PROFILE: ${INSTALL_PROFILE:-standard}
      SITE_NAME: ${SITE_NAME:-Honda Motoverso}
      SITE_MAIL: ${SITE_MAIL:-admin@example.com}
      ACCOUNT_NAME: ${ACCOUNT_NAME:-admin}
      ACCOUNT_MAIL: ${ACCOUNT_MAIL:-admin@example.com}
      ACCOUNT_PASS: ${ACCOUNT_PASS:-admin123456}
      DB_WAIT_RETRIES: ${DB_WAIT_RETRIES:-60}
      DB_WAIT_DELAY: ${DB_WAIT_DELAY:-2}
    volumes:
      - drupal_files:/opt/drupal/web/sites/default/files
    networks:
      - internal

  db:
    image: mariadb:10.6
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root}
      MYSQL_DATABASE: ${DB_NAME:-drupal}
      MYSQL_USER: ${DB_USER:-drupal}
      MYSQL_PASSWORD: ${DB_PASS:-drupal}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    volumes:
      - drupal_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    env_file:
      - .env
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root}
      PHP_UPLOAD_MAX_FILESIZE: 512M
      PHP_POST_MAX_SIZE: 512M
      UPLOAD_LIMIT: 536870912
    networks:
      - internal

volumes:
  drupal_files:
  drupal_db:

networks:
  internal:
    driver: bridge
